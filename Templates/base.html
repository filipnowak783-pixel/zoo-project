<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zoo Website{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<!-- nav bar -->
<div class="topnav">
    <a href="/" {% if request.endpoint == 'home' %}class="active"{% endif %}>Home</a>
    <a href="/about" {% if request.endpoint == 'about' %}class="active"{% endif %}>About us</a>
    <a href="/signup" {% if request.endpoint == 'signup' %}class="active"{% endif %}>Sign up</a>
    <a href="/login" {% if request.endpoint == 'login' %}class="active"{% endif %}>Login</a>
    <a href="/hotelbooking" {% if request.endpoint =='hotelbooking' %}class="active"{% endif %}>Hotel booking</a>
    <a href="/zoobooking" {% if request.endpoint == 'zoobooking' %}class="active"{% endif %}>Zoo booking</a>
</div>


<!-- review widget -->
<div class="review-widget">
    <h3>Rate Your Visit</h3>
    <div class="stars">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>
    <textarea id="review-text" placeholder="Please write us a short review..."></textarea>
    <button id="submit-review">Submit</button>
    <p id="review-confirm">Thank you for your review!</p>
</div>

{% block body %}
{% endblock %}

<footer>
    <p>Zoo Adventure &copy; 2026</p>
</footer>

{% block scripts %}
<script>
    // star rating thing
    const stars = document.querySelectorAll('.stars span');
    let rating = 0;

    stars.forEach(star => {
        star.addEventListener('click', () => {
            rating = star.dataset.value;
            stars.forEach(s => s.classList.remove('selected'));
            for (let i = 0; i < rating; i++) {
                stars[i].classList.add('selected');
            }
        });
    });

    document.getElementById('submit-review').addEventListener('click', () => {
        const text = document.getElementById('review-text').value;
        if (rating == 0 || text.trim() == "") {
            alert("Please select a rating and write a review.");
            return;
        }
        document.getElementById('review-confirm').style.display = 'block';
        console.log("Rating:", rating);
        console.log("Review:", text);
    });
</script>

{% endblock %}

</body>
</html>
