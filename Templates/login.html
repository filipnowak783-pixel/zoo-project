{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block body %}

<h1>Login!</h1>

<div class="form-container">
    <h2>Login to your account</h2>

    <!-- show success message if they just signed up -->
    {% if success %}
        <p style="color: green; margin-bottom: 15px;">Account created! You can login now.</p>
    {% endif %}

    <!-- show error if wrong password etc -->
    {% if error %}
        <p style="color: red; margin-bottom: 15px;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/login">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit" class="btn">Login</button>
    </form>

    <p style="margin-top: 15px;">Don't have an account? <a href="/signup">Sign up here</a></p>
</div>
{% endblock %}
